name: build-and-release-dist

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号，例如 v2.0.1'
        required: false
        default: 'v2.0.1'
      publish_release:
        description: '是否创建 GitHub Release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve version and release meta
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
            SHOULD_RELEASE=true
            RELEASE_TAG="${VERSION}"
            RELEASE_NAME="EasyLearningCS ${VERSION}"
            PRERELEASE=false
            MAKE_LATEST=true
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            SHOULD_RELEASE="${{ inputs.publish_release }}"
            RELEASE_TAG="${VERSION}"
            RELEASE_NAME="EasyLearningCS ${VERSION}"
            PRERELEASE=false
            MAKE_LATEST=true
          else
            VERSION="v2.0.1"
            SHOULD_RELEASE=true
            RELEASE_TAG="latest-dist"
            RELEASE_NAME="EasyLearningCS 最新构建"
            PRERELEASE=true
            MAKE_LATEST=false
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "should_release=${SHOULD_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "make_latest=${MAKE_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Build dist packages
        run: python3 scripts/build_release.py --version "${{ steps.meta.outputs.version }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyLearningCS-dist-${{ steps.meta.outputs.version }}
          path: dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: steps.meta.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          files: dist/*.zip
          generate_release_notes: true
