<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎨 Blockly海龟画板 - Python魔法学院</title>
  
  <!-- 本地字体 -->
  <link rel="stylesheet" href="lib/css/fonts.css">
  <!-- Font Awesome (本地) -->
  <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
  
  <!-- Blockly CSS -->
  <link href="https://unpkg.com/blockly@10.4.3/blockly.min.css" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Modular CSS -->
  <link rel="stylesheet" href="css/pages/blockly-canvas.css">
</head>
<body>
  <!-- 顶部导航 -->
  <nav class="top-nav">
    <div class="nav-brand">
      <i class="fas fa-palette"></i>
      <span>Blockly海龟画板</span>
    </div>
    
    <div class="nav-actions">
      <div class="speed-control">
        <i class="fas fa-turtle"></i>
        <input type="range" id="speedSlider" class="speed-slider" min="1" max="5" value="3">
        <i class="fas fa-rocket"></i>
      </div>
      
      <button class="btn btn-secondary" onclick="clearCanvas()">
        <i class="fas fa-eraser"></i>
        清空画布
      </button>
      
      <button class="btn btn-primary" onclick="runCode()">
        <i class="fas fa-play"></i>
        运行代码
      </button>
      
      <button class="btn btn-secondary" onclick="showGeneratedCode()">
        <i class="fas fa-code"></i>
        查看代码
      </button>
      
      <button class="btn btn-danger" onclick="resetWorkspace()">
        <i class="fas fa-trash"></i>
        重置
      </button>
      
      <a href="index.html" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i>
        返回
      </a>
    </div>
  </nav>
  
  <!-- 主工作区 -->
  <div class="workspace">
    <!-- 左侧 - 画布 -->
    <div class="canvas-panel">
      <div class="panel-header">
        <div class="panel-title">
          <i class="fas fa-paint-brush"></i>
          海龟画板
        </div>
        <div class="canvas-overlay" id="canvasInfo">
          X: 0 | Y: 0 | 角度: 0°
        </div>
      </div>
      <div class="canvas-container">
        <canvas id="turtleCanvas"></canvas>
      </div>
    </div>
    
    <!-- 右侧 - Blockly -->
    <div class="blockly-panel">
      <div class="panel-header">
        <div class="panel-title">
          <i class="fas fa-cubes"></i>
          积木编程区
        </div>
      </div>
      <div id="blocklyDiv"></div>
    </div>
    
    <!-- 底部 - 代码和变量 -->
    <div class="bottom-panel">
      <!-- 生成的代码 -->
      <div class="code-panel">
        <div class="panel-header">
          <div class="panel-title">
            <i class="fas fa-file-code"></i>
            Python 代码
          </div>
          <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.8rem;" onclick="copyCode()">
            <i class="fas fa-copy"></i>
            复制
          </button>
        </div>
        <pre class="code-display" id="codeDisplay"><span class="token-comment"># 点击"运行代码"或"查看代码"生成 Python 代码</span></pre>
      </div>
      
      <!-- 变量监控 -->
      <div class="variables-panel">
        <div class="panel-header">
          <div class="panel-title">
            <i class="fas fa-eye"></i>
            变量监控
          </div>
        </div>
        <div class="variables-list" id="variablesList">
          <div class="empty-state">
            <i class="fas fa-clipboard-list"></i>
            <p>运行代码后变量将显示在这里</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Blockly 工具箱定义 -->
  <xml id="toolbox" style="display: none">
    <category name="🏠 事件" colour="#E74C3C">
      <block type="turtle_start"></block>
    </category>
    
    <category name="🎨 画笔控制" colour="#9B59B6">
      <block type="turtle_penup"></block>
      <block type="turtle_pendown"></block>
      <block type="turtle_pencolor"></block>
      <block type="turtle_pensize"></block>
      <block type="turtle_speed"></block>
    </category>
    
    <category name="🐢 海龟运动" colour="#3498DB">
      <block type="turtle_forward"></block>
      <block type="turtle_backward"></block>
      <block type="turtle_left"></block>
      <block type="turtle_right"></block>
      <block type="turtle_goto"></block>
      <block type="turtle_home"></block>
      <block type="turtle_circle"></block>
      <block type="turtle_dot"></block>
      <block type="turtle_stamp"></block>
    </category>
    
    <category name="🔧 控制流" colour="#F39C12">
      <block type="controls_repeat_ext">
        <value name="TIMES">
          <shadow type="math_number">
            <field name="NUM">4</field>
          </shadow>
        </value>
      </block>
      <block type="controls_whileUntil"></block>
      <block type="controls_for">
        <field name="VAR">i</field>
        <value name="FROM">
          <shadow type="math_number">
            <field name="NUM">0</field>
          </shadow>
        </value>
        <value name="TO">
          <shadow type="math_number">
            <field name="NUM">10</field>
          </shadow>
        </value>
        <value name="BY">
          <shadow type="math_number">
            <field name="NUM">1</field>
          </shadow>
        </value>
      </block>
    </category>
    
    <category name="📐 数学运算" colour="#2ECC71">
      <block type="math_number">
        <field name="NUM">100</field>
      </block>
      <block type="math_arithmetic"></block>
      <block type="math_random_int">
        <value name="FROM">
          <shadow type="math_number">
            <field name="NUM">1</field>
          </shadow>
        </value>
        <value name="TO">
          <shadow type="math_number">
            <field name="NUM">100</field>
          </shadow>
        </value>
      </block>
      <block type="math_constant"></block>
      <block type="math_modulo"></block>
    </category>
    
    <category name="📦 变量" colour="#E67E22" custom="VARIABLE"></category>
    <category name="📋 列表" colour="#1ABC9C" custom="PROCEDURE"></category>
    
    <category name="📖 更多积木" colour="#95A5A6">
      <block type="turtle_fill"></block>
      <block type="turtle_bgcolor"></block>
      <block type="turtle_hide"></block>
      <block type="turtle_show"></block>
    </category>
  </xml>
  
  <!-- Blockly 库 -->
  <script src="https://unpkg.com/blockly@10.4.3/blockly.min.js"></script>
  <script src="https://unpkg.com/blockly@10.4.3/python_compressed.js"></script>
  
  <!-- Modular JS -->
  <script src="js/pages/blockly-canvas/globals.js"></script>
  <script src="js/pages/blockly-canvas/canvas.js"></script>
  <script src="js/pages/blockly-canvas/turtle-cmd.js"></script>
  <script src="js/pages/blockly-canvas/blocks.js"></script>
  <script src="js/pages/blockly-canvas/executor.js"></script>
  <script src="js/pages/blockly-canvas/ui.js"></script>
  <script src="js/pages/blockly-canvas/init.js"></script>
</body>
</html>
