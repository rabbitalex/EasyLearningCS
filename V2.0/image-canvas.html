<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🖼️ 图片画板 - 创意拼贴工坊</title>
  
  <!-- 本地字体 & 图标 -->
  <link rel="stylesheet" href="lib/css/fonts.css">
  <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
  
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Canvas CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/image-canvas.css">
</head>
<body class="image-canvas-body">
  <!-- Top Navigation -->
  <nav class="top-nav h-16 glass-card fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-400 to-purple-500 flex items-center justify-center animate-pulse-glow">
        <i class="fas fa-images text-white text-lg"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold gradient-text">创意拼贴工坊</h1>
        <span class="text-xs text-gray-400">拖拽 · 放置 · 创作</span>
      </div>
    </div>
    
    <div class="flex items-center gap-3">
      <!-- 工具按钮组 -->
      <div class="tool-group flex items-center gap-2 bg-white/5 rounded-xl p-1">
        <button id="toolSelect" class="tool-btn active" data-tool="select" title="选择工具 (V)">
          <i class="fas fa-mouse-pointer"></i>
        </button>
        <button id="toolHand" class="tool-btn" data-tool="hand" title="手型工具 (H)">
          <i class="fas fa-hand-paper"></i>
        </button>
      </div>
      
      <div class="h-6 w-px bg-white/10"></div>
      
      <button id="btnAddText" class="btn-neon px-4 py-2 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 text-white text-sm font-bold flex items-center gap-2">
        <i class="fas fa-font"></i> 添加文字
      </button>
      
      <button id="btnClear" class="icon-btn" data-tooltip="清空画布">
        <i class="fas fa-trash"></i>
      </button>
      
      <button id="btnUndo" class="icon-btn" data-tooltip="撤销 (Ctrl+Z)" disabled>
        <i class="fas fa-undo"></i>
      </button>
      
      <button id="btnRedo" class="icon-btn" data-tooltip="重做 (Ctrl+Y)" disabled>
        <i class="fas fa-redo"></i>
      </button>
      
      <a href="index.html" class="icon-btn" data-tooltip="返回主页">
        <i class="fas fa-home"></i>
      </a>
    </div>
  </nav>

  <!-- Main Layout -->
  <main class="pt-16 h-screen flex">
    <!-- Left: Image Library -->
    <aside class="w-72 glass-card m-3 flex flex-col overflow-hidden">
      <div class="p-4 border-b border-white/10">
        <h3 class="font-bold flex items-center gap-2">
          <i class="fas fa-photo-video text-pink-400"></i>
          素材库
        </h3>
        <p class="text-xs text-gray-400 mt-1">拖拽图片到画布，或点击添加</p>
      </div>
      
      <!-- 素材分类标签 -->
      <div class="flex gap-2 p-3 border-b border-white/10 overflow-x-auto">
        <button class="category-btn active" data-category="emoji">😀 Emoji</button>
        <button class="category-btn" data-category="animals">🐱 动物</button>
        <button class="category-btn" data-category="nature">🌸 自然</button>
        <button class="category-btn" data-category="food">🍕 食物</button>
        <button class="category-btn" data-category="objects">🎮 物品</button>
      </div>
      
      <!-- 图片网格 -->
      <div id="imageLibrary" class="flex-1 overflow-y-auto p-3">
        <!-- 动态生成 -->
      </div>
      
      <!-- 本地图片上传 -->
      <div class="p-4 border-t border-white/10">
        <label class="upload-btn cursor-pointer">
          <input type="file" id="localImageUpload" accept="image/*" multiple class="hidden">
          <i class="fas fa-cloud-upload-alt"></i>
          <span>上传本地图片</span>
        </label>
      </div>
    </aside>
    
    <!-- Center: Canvas Area -->
    <section class="flex-1 glass-card m-3 ml-0 flex flex-col overflow-hidden relative">
      <!-- Canvas Toolbar -->
      <div class="canvas-toolbar flex items-center justify-between px-4 py-3 border-b border-white/10">
        <div class="flex items-center gap-4">
          <span class="text-sm text-gray-400">
            <i class="fas fa-ruler-combined mr-1"></i>
            <span id="canvasSize">800 × 600</span>
          </span>
          <span class="text-sm text-gray-400">
            <i class="fas fa-layer-group mr-1"></i>
            图层: <span id="layerCount">0</span>
          </span>
        </div>
        
        <div class="flex items-center gap-2">
          <span class="text-xs text-gray-400">缩放</span>
          <input type="range" id="zoomSlider" min="25" max="200" value="100" class="zoom-slider">
          <span id="zoomValue" class="text-sm text-cyan-400 font-bold w-12">100%</span>
          <button id="btnFit" class="text-xs px-2 py-1 rounded bg-white/10 hover:bg-white/20 transition">
            适应
          </button>
        </div>
      </div>
      
      <!-- Canvas Container -->
      <div class="canvas-viewport flex-1 overflow-auto relative bg-gradient-dark" id="canvasViewport">
        <div id="canvasWrapper" class="canvas-wrapper">
          <canvas id="mainCanvas" width="800" height="600"></canvas>
          
          <!-- 选中框 -->
          <div id="selectionBox" class="selection-box hidden">
            <div class="selection-handle handle-nw" data-handle="nw"></div>
            <div class="selection-handle handle-n" data-handle="n"></div>
            <div class="selection-handle handle-ne" data-handle="ne"></div>
            <div class="selection-handle handle-e" data-handle="e"></div>
            <div class="selection-handle handle-se" data-handle="se"></div>
            <div class="selection-handle handle-s" data-handle="s"></div>
            <div class="selection-handle handle-sw" data-handle="sw"></div>
            <div class="selection-handle handle-w" data-handle="w"></div>
            <div class="selection-rotate" data-handle="rotate">
              <i class="fas fa-sync-alt"></i>
            </div>
            <button class="selection-delete" data-handle="delete">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
      </div>
    </section>
    
    <!-- Right: Properties Panel -->
    <aside id="propertiesPanel" class="w-64 glass-card m-3 ml-0 flex flex-col overflow-hidden hidden">
      <div class="p-4 border-b border-white/10">
        <h3 class="font-bold flex items-center gap-2">
          <i class="fas fa-sliders-h text-cyan-400"></i>
          属性面板
        </h3>
      </div>
      
      <div class="flex-1 overflow-y-auto p-4 space-y-4">
        <!-- 位置 -->
        <div class="prop-group">
          <label class="prop-label">位置</label>
          <div class="prop-row">
            <div class="prop-input-group">
              <span class="prop-input-prefix">X</span>
              <input type="number" id="propX" class="prop-input">
            </div>
            <div class="prop-input-group">
              <span class="prop-input-prefix">Y</span>
              <input type="number" id="propY" class="prop-input">
            </div>
          </div>
        </div>
        
        <!-- 尺寸 -->
        <div class="prop-group">
          <label class="prop-label">尺寸</label>
          <div class="prop-row">
            <div class="prop-input-group">
              <span class="prop-input-prefix">W</span>
              <input type="number" id="propW" class="prop-input">
            </div>
            <div class="prop-input-group">
              <span class="prop-input-prefix">H</span>
              <input type="number" id="propH" class="prop-input">
            </div>
          </div>
          <label class="flex items-center gap-2 mt-2 cursor-pointer">
            <input type="checkbox" id="propLockRatio" checked class="accent-cyan-500">
            <span class="text-xs text-gray-400">锁定比例</span>
          </label>
        </div>
        
        <!-- 旋转 -->
        <div class="prop-group">
          <label class="prop-label">旋转</label>
          <div class="flex items-center gap-2">
            <input type="range" id="propRotate" min="-180" max="180" value="0" class="flex-1">
            <input type="number" id="propRotateValue" class="prop-input w-16" value="0">
            <span class="text-gray-400">°</span>
          </div>
        </div>
        
        <!-- 透明度 -->
        <div class="prop-group">
          <label class="prop-label">透明度</label>
          <div class="flex items-center gap-2">
            <input type="range" id="propOpacity" min="0" max="100" value="100" class="flex-1">
            <span id="propOpacityValue" class="text-sm text-cyan-400 w-10">100%</span>
          </div>
        </div>
        
        <!-- 层级 -->
        <div class="prop-group">
          <label class="prop-label">层级</label>
          <div class="flex gap-2">
            <button id="btnLayerUp" class="layer-btn" title="上移一层">
              <i class="fas fa-arrow-up"></i>
            </button>
            <button id="btnLayerDown" class="layer-btn" title="下移一层">
              <i class="fas fa-arrow-down"></i>
            </button>
            <button id="btnLayerTop" class="layer-btn" title="置于顶层">
              <i class="fas fa-angle-double-up"></i>
            </button>
            <button id="btnLayerBottom" class="layer-btn" title="置于底层">
              <i class="fas fa-angle-double-down"></i>
            </button>
          </div>
        </div>
        
        <!-- 阴影效果 -->
        <div class="prop-group">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="propShadow" class="accent-cyan-500">
            <span class="text-sm">投影效果</span>
          </label>
        </div>
        
        <!-- 翻转 -->
        <div class="prop-group">
          <label class="prop-label">翻转</label>
          <div class="flex gap-2">
            <button id="btnFlipH" class="flip-btn" title="水平翻转">
              <i class="fas fa-arrows-alt-h"></i>
            </button>
            <button id="btnFlipV" class="flip-btn" title="垂直翻转">
              <i class="fas fa-arrows-alt-v"></i>
            </button>
          </div>
        </div>
      </div>
      
      <!-- 删除按钮 -->
      <div class="p-4 border-t border-white/10">
        <button id="btnDeleteSelected" class="w-full py-2 rounded-xl bg-red-500/20 text-red-400 hover:bg-red-500/30 transition flex items-center justify-center gap-2">
          <i class="fas fa-trash"></i> 删除选中元素
        </button>
      </div>
    </aside>
  </main>
  
  <!-- Add Text Modal -->
  <div id="textModal" class="modal-overlay hidden">
    <div class="modal-content glass-card p-6 w-96">
      <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
        <i class="fas fa-font text-cyan-400"></i>
        添加文字
      </h3>
      <textarea id="textInput" class="w-full h-24 bg-white/5 border border-white/10 rounded-xl p-3 text-sm focus:border-cyan-400 outline-none resize-none mb-4" placeholder="输入文字..."></textarea>
      <div class="flex items-center gap-4 mb-4">
        <label class="text-sm text-gray-400">颜色:</label>
        <input type="color" id="textColor" value="#ffffff" class="w-10 h-8 rounded cursor-pointer">
        <label class="text-sm text-gray-400 ml-2">大小:</label>
        <input type="range" id="textSize" min="12" max="120" value="24" class="flex-1">
        <span id="textSizeValue" class="text-sm text-cyan-400 w-8">24</span>
      </div>
      <div class="flex gap-3">
        <button id="btnCancelText" class="flex-1 py-2 rounded-xl bg-white/10 hover:bg-white/20 transition">取消</button>
        <button id="btnConfirmText" class="flex-1 py-2 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-bold">添加</button>
      </div>
    </div>
  </div>
  
  <!-- Scripts -->
  <script src="js/image-canvas/library.js"></script>
  <script src="js/image-canvas/main.js"></script>
  <script src="js/image-canvas/elements.js"></script>
  <script src="js/image-canvas/render.js"></script>
  <script src="js/image-canvas/ui.js"></script>
  <script src="js/image-canvas/events.js"></script>
</body>
</html>
