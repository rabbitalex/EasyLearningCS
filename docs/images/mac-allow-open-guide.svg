<svg width="900" height="1180" viewBox="0 0 900 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="1180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16181D"/>
      <stop offset="1" stop-color="#101216"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#23262D"/>
      <stop offset="1" stop-color="#1A1D23"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="900" height="1180" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="900" height="1180" rx="28" fill="#0D0F13"/>
  <text x="450" y="72" text-anchor="middle" fill="#F5F7FA" font-size="30" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">macOS 放行启动脚本示意图</text>
  <text x="450" y="112" text-anchor="middle" fill="#A9B1BC" font-size="18" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">如果系统拦截了 `双击启动.command`，去“系统设置 → 隐私与安全性”点击“仍要打开”</text>

  <g filter="url(#shadow)">
    <rect x="36" y="150" width="828" height="980" rx="26" fill="url(#bg)" stroke="#2B313B"/>
    <rect x="36" y="150" width="828" height="62" rx="26" fill="#111319"/>
    <circle cx="78" cy="181" r="8" fill="#FF5F57"/>
    <circle cx="104" cy="181" r="8" fill="#FEBC2E"/>
    <circle cx="130" cy="181" r="8" fill="#28C840"/>

    <rect x="56" y="230" width="230" height="860" rx="20" fill="#16191F"/>
    <rect x="74" y="252" width="194" height="40" rx="14" fill="#232832"/>
    <text x="102" y="278" fill="#8F98A6" font-size="17" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">搜索</text>

    <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" fill="#AFB7C3">
      <text x="92" y="336">辅助功能</text>
      <text x="92" y="390">聚焦</text>
      <text x="92" y="444">墙纸</text>
      <text x="92" y="498">外观</text>
      <text x="92" y="552">显示器</text>
      <text x="92" y="606">声音</text>
      <text x="92" y="660">专注模式</text>
      <text x="92" y="714">锁定屏幕</text>
      <rect x="72" y="742" width="196" height="48" rx="14" fill="#6E768533" stroke="#A0A7B3" stroke-opacity="0.25"/>
      <text x="92" y="772" fill="#F0F3F7">隐私与安全性</text>
      <text x="92" y="826">触控 ID 与密码</text>
      <text x="92" y="880">用户与群组</text>
      <text x="92" y="934">互联网账户</text>
    </g>

    <g>
      <text x="330" y="260" fill="#F3F5F8" font-size="34" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">隐私与安全性</text>
      <text x="330" y="304" fill="#8F98A6" font-size="17" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">滚动到下方“安全性”区域，找到被阻止的启动项</text>

      <g fill="#232832">
        <rect x="330" y="344" width="486" height="58" rx="16"/>
        <rect x="330" y="416" width="486" height="58" rx="16"/>
        <rect x="330" y="488" width="486" height="58" rx="16"/>
        <rect x="330" y="560" width="486" height="58" rx="16"/>
        <rect x="330" y="632" width="486" height="58" rx="16"/>
      </g>
      <g fill="#D7DCE4" font-size="18" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
        <text x="356" y="380">摄像头</text>
        <text x="356" y="452">输入监控</text>
        <text x="356" y="524">语音识别</text>
        <text x="356" y="596">远程桌面</text>
        <text x="356" y="668">运动与健身</text>
      </g>

      <text x="330" y="748" fill="#F3F5F8" font-size="24" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">安全性</text>
      <rect x="330" y="778" width="486" height="176" rx="20" fill="#1B2027"/>
      <text x="356" y="824" fill="#B4BCC8" font-size="17" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">允许以下来源的应用程序</text>
      <rect x="660" y="794" width="132" height="42" rx="12" fill="#2C313C"/>
      <text x="676" y="821" fill="#E8EBF0" font-size="16" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">App Store 与已知开发者</text>

      <rect x="348" y="862" width="450" height="62" rx="14" fill="#332224" stroke="#FF6B6B" stroke-width="3"/>
      <text x="366" y="900" fill="#FFF3F3" font-size="17" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">已阻止 “双击启动.command” 以保护 Mac。</text>
      <rect x="688" y="874" width="92" height="38" rx="12" fill="#5A616D"/>
      <text x="711" y="898" fill="#FFFFFF" font-size="17" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">仍要打开</text>
      <text x="356" y="946" fill="#8F98A6" font-size="15" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">如果这里出现拦截提示，点击右侧按钮即可放行</text>
    </g>
  </g>

  <g>
    <path d="M842 816C858 816 870 804 870 788C870 772 858 760 842 760C826 760 814 772 814 788C814 804 826 816 842 816Z" fill="#FF6B6B"/>
    <path d="M760 772L814 788" stroke="#FF6B6B" stroke-width="6" stroke-linecap="round"/>
    <path d="M760 804L814 790" stroke="#FF6B6B" stroke-width="6" stroke-linecap="round" opacity="0.18"/>
    <rect x="604" y="724" width="150" height="70" rx="18" fill="#FF6B6B"/>
    <text x="679" y="752" text-anchor="middle" fill="#FFFFFF" font-size="19" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">点这里</text>
    <text x="679" y="778" text-anchor="middle" fill="#FFF4F4" font-size="16" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">允许执行</text>
  </g>

  <g>
    <rect x="70" y="1046" width="760" height="84" rx="20" fill="#11161D" stroke="#2D3643"/>
    <text x="100" y="1084" fill="#F0F3F7" font-size="18" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">操作顺序</text>
    <text x="100" y="1114" fill="#B4BCC8" font-size="17" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">右键打开一次 → 如果仍被阻止，进入“系统设置 → 隐私与安全性” → 点击“仍要打开” → 再次打开</text>
  </g>
</svg>
